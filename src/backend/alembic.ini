# ============================================
# SynapSeed — Alembic configuration
# ============================================
# Esta configuración se inicializa correctamente con `alembic init`
# en la fase 1, pero dejamos el placeholder para que docker-compose
# pueda ejecutar `alembic upgrade head` sin fallar.
#
# En la fase 1, después de correr `alembic init alembic`, mover este
# archivo a `alembic.ini` y dejar que el `alembic/` generado use
# `app.config.get_settings().database_url_sync`.

[alembic]
# Ubicación de las migraciones (se crea en fase 1)
script_location = alembic

# Template usado para nuevas migraciones
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone para timestamps
timezone = UTC

# Max length para slugs
truncate_slug_length = 40

# Sobrescribir el sqlalchemy.url desde env.py en runtime
# (no hardcodear credenciales aquí)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Tags para organizar migraciones
# tag = ""

[post_write_hooks]
# (opcional) formatear archivos generados con ruff

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
