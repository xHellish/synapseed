# Agentic Workspace Configuration
# This file centralizes workspace behavior settings.
# Skills inherit these defaults; override in project-specific forks.

workspace:
  name: "Agentic Workspace"
  version: "1.0.0"

  # Language for agent responses (ISO 639-1 code)
  # All skills respond in this language
  response_language: "es"  # "es" = Spanish | "en" = English | "pt" = Portuguese

  # Primary languages the agent has deep expertise in
  primary_languages:
    - python
    - javascript
    - typescript

  # Secondary languages with structural/architectural support
  secondary_languages:
    - go
    - java
    - rust

skills:
  # Global defaults applied to all skills
  defaults:
    # Minimum severity to include in reports (critical | high | medium | low)
    min_severity_to_report: "low"
    # Include before/after code examples in proposals
    include_code_examples: true
    # Limit review scope to files explicitly mentioned (false = analyze full codebase)
    scoped_review: false

  # Per-skill overrides (uncomment and customize as needed)
  # code-improver:
  #   max_files_per_review: 10
  #   focus: ["security", "performance"]  # Focus only on these categories
  #
  # security-auditor:
  #   severity_threshold: "medium"  # Only report medium and above
  #   include_supply_chain: true
  #
  # project-scaffolder:
  #   default_stack: "python-api"    # Pre-select a template
  #   include_docker: true
  #   include_ci: true
  #
  # test-strategist:
  #   coverage_target:
  #     unit: 80
  #     branch: 75
  #   preferred_framework: "vitest"  # "vitest" | "jest" | "pytest"

pipelines:
  # Ordered sequences of skills for common workflows
  # Skills execute in order; findings from each inform the next
  new-project:
    description: "Full pipeline for bootstrapping a new project"
    steps:
      - software-architect  # Design architecture first
      - project-scaffolder  # Generate structure based on design
      - test-strategist     # Define testing strategy
      - security-auditor    # Ensure security tooling is in place
      - docs-generator      # Generate README and initial docs

  code-review:
    description: "Comprehensive code quality and security review"
    steps:
      - structure-analyzer  # Map the codebase first
      - code-improver       # Identify quality issues
      - security-auditor    # Identify security issues

  audit-full:
    description: "Full project health audit"
    steps:
      - structure-analyzer  # Architecture and structure health
      - security-auditor    # Security posture
      - test-strategist     # Test coverage and quality
      - code-improver       # Code quality
      - docs-generator      # Documentation gaps

  quick-review:
    description: "Fast review of a single file or small module"
    steps:
      - code-improver
      - security-auditor
