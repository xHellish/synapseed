# ============================================
# SynapSeed — Docker Compose (desarrollo local)
# ============================================
# Stack: redis + backend (FastAPI) + worker (Celery) + frontend (Vite HMR)
# DB: Supabase (externa) — no se levanta postgres localmente.
#
# Uso rápido:
#   docker compose up -d            → levantar todo en background
#   docker compose logs -f backend  → ver logs del backend
#   docker compose down             → bajar todo
#
# Accesos una vez levantado:
#   Frontend  → http://localhost:5173
#   Swagger   → http://localhost:8000/docs
#   ReDoc     → http://localhost:8000/redoc
#   API       → http://localhost:8000/api/v1

services:

  # -----------------------------------------------------------
  # PostgreSQL 16 + pgvector — DB local para desarrollo
  # -----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapseed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapseed
      POSTGRES_USER: synapseed
      POSTGRES_PASSWORD: synapseed
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapseed -d synapseed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapseed-net

  # -----------------------------------------------------------
  # Redis 7 — broker de Celery + pub/sub SSE
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: synapseed-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapseed-net

  # -----------------------------------------------------------
  # Backend — FastAPI + Uvicorn (autoreload en dev)
  # Swagger disponible en http://localhost:8000/docs
  # -----------------------------------------------------------
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    container_name: synapseed-backend
    restart: unless-stopped

    # Lee el .env de la raíz del repo
    env_file:
      - .env

    # Sobreescribe solo las URLs internas de Docker (redis usa el nombre del servicio)
    environment:
      DATABASE_URL: postgresql+asyncpg://synapseed:synapseed@postgres:5432/synapseed
      DATABASE_URL_SYNC: postgresql+psycopg2://synapseed:synapseed@postgres:5432/synapseed
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Permite que Swagger sea accesible desde el browser del host
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8000","http://127.0.0.1:5173","http://127.0.0.1:3000","http://127.0.0.1:8000"]'

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    # Corre migraciones primero, luego levanta uvicorn con reload
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - synapseed-net

  # -----------------------------------------------------------
  # Worker — Celery ejecutando el pipeline LangGraph / IA
  # -----------------------------------------------------------
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.worker
    container_name: synapseed-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+asyncpg://synapseed:synapseed@postgres:5432/synapseed
      DATABASE_URL_SYNC: postgresql+psycopg2://synapseed:synapseed@postgres:5432/synapseed
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - synapseed-net

  # -----------------------------------------------------------
  # Frontend — Vite dev server con HMR
  # Accesible en http://localhost:5173
  # El proxy de Vite enruta /api → backend:8000 dentro de la red Docker
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: synapseed-frontend
    restart: unless-stopped

    environment:
      # Apunta al servicio backend dentro de la red Docker
      # Vite proxy usa esta variable para redirigir /api/* → backend:8000
      VITE_API_URL: http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-5173}:5173"

    # Monta código fuente para HMR; node_modules queda en volumen anónimo
    volumes:
      - ./src/frontend/src:/app/src
      - ./src/frontend/public:/app/public
      - ./src/frontend/index.html:/app/index.html
      - ./src/frontend/vite.config.ts:/app/vite.config.ts
      - ./src/frontend/vite.config.js:/app/vite.config.js
      - frontend_node_modules:/app/node_modules

    networks:
      - synapseed-net

# ============================================
# Volúmenes persistentes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

# ============================================
# Red interna compartida entre servicios
# ============================================
networks:
  synapseed-net:
    driver: bridge
