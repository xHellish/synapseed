# Docker Compose para desarrollo local de SynapSeed
# Stack: redis + backend (FastAPI) + worker (Celery) + frontend (Vite HMR)
# La base de datos es Supabase (externa), no se levanta postgres local.
#
# Comandos rapidos:
#   docker compose up -d            - levantar todo en background
#   docker compose logs -f backend  - ver logs del backend
#   docker compose down             - bajar todo
#
# Accesos una vez levantado:
#   Frontend  - http://localhost:5173
#   Swagger   - http://localhost:8000/docs
#   API       - http://localhost:8000/api/v1

services:

  # Redis 7 - broker de Celery y pub/sub para SSE
  redis:
    image: redis:7-alpine
    container_name: synapseed-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapseed-net

  # Backend - FastAPI con autoreload. DB y Auth vienen de Supabase (.env).
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    container_name: synapseed-backend
    restart: unless-stopped

    # Todas las variables (DATABASE_URL, SUPABASE_*, JWT_*, LLM, etc.) vienen del .env
    env_file:
      - .env

    # Solo se sobreescriben las URLs internas de Docker (DATABASE_URL viene del .env → Supabase)
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8000","http://127.0.0.1:5173","http://127.0.0.1:3000","http://127.0.0.1:8000"]'

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    # Monta el código fuente para que --reload detecte cambios en desarrollo
    volumes:
      - ./src/backend/app:/app/app
      - ./src/backend/alembic:/app/alembic

    # Corre migraciones primero, luego levanta uvicorn con reload
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - synapseed-net

  # Worker - Celery ejecuta el pipeline de agentes IA (LangGraph)
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.worker
    container_name: synapseed-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - synapseed-net

  # Frontend - Vite con HMR en :5173. El proxy enruta /api al backend.
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: synapseed-frontend
    restart: unless-stopped

    environment:
      # Vite proxy usa esta variable para redirigir /api/* → backend:8000
      VITE_API_URL: http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-5173}:5173"

    # Monta código fuente para HMR; node_modules queda en volumen anónimo
    volumes:
      - ./src/frontend/src:/app/src
      - ./src/frontend/public:/app/public
      - ./src/frontend/index.html:/app/index.html
      - ./src/frontend/vite.config.ts:/app/vite.config.ts
      - ./src/frontend/vite.config.js:/app/vite.config.js
      - frontend_node_modules:/app/node_modules

    networks:
      - synapseed-net

# Volumenes persistentes
volumes:
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

# Red interna compartida entre servicios
networks:
  synapseed-net:
    driver: bridge
